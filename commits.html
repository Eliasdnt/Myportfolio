<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elias - Commit History</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/commits.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="back-home">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Voltar ao Portfolio</a>
    </div>

    <main class="commits-container">
        <header class="commits-header">
            <h1><i class="fa-solid fa-code-commit"></i> Histórico de Commits</h1>
            <p>Acompanhe meu progresso e contribuições mais recentes no GitHub.</p>
        </header>

        <div id="commits-list" class="commits-list">
            <div class="loading">Carregando commits...</div>
        </div>

        <section class="github-stats">
            <div class="stats-card">
                <img src="https://github-readme-stats.vercel.app/api?username=Eliasdnt&show_icons=true&theme=radical&bg_color=5fb9b0&title_color=ffffff&text_color=ffffff&icon_color=b292ff" alt="GitHub Stats">
            </div>
            <div class="stats-card">
                <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=Eliasdnt&layout=compact&theme=radical&bg_color=b292ff&title_color=ffffff&text_color=ffffff&icon_color=5fb9b0" alt="Top Langs">
            </div>
        </section>
    </main>

    <script>
        async function fetchCommits() {
            const container = document.getElementById('commits-list');
            try {
                // Fetching from a few repos to show activity
                const username = 'Eliasdnt';
                const response = await fetch(`https://api.github.com/users/${username}/events`);
                const events = await response.json();
                
                const pushEvents = events.filter(event => event.type === 'PushEvent').slice(0, 10);
                
                if (pushEvents.length === 0) {
                    container.innerHTML = '<p>Nenhum commit recente encontrado.</p>';
                    return;
                }

                container.innerHTML = '';
                pushEvents.forEach(event => {
                    const repoName = event.repo.name.split('/')[1];
                    const commits = event.payload.commits;
                    const date = new Date(event.created_at).toLocaleDateString('pt-BR', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    commits.forEach(commit => {
                        const commitEl = document.createElement('div');
                        commitEl.className = 'commit-card';
                        commitEl.innerHTML = `
                            <div class="commit-icon"><i class="fa-brands fa-github"></i></div>
                            <div class="commit-details">
                                <span class="commit-date">${date}</span>
                                <h3 class="commit-message">${commit.message}</h3>
                                <p class="commit-repo"><i class="fa-solid fa-book"></i> ${repoName}</p>
                                <a href="https://github.com/${event.repo.name}/commit/${commit.sha}" target="_blank" class="commit-link">Ver Commit <i class="fa-solid fa-external-link"></i></a>
                            </div>
                        `;
                        container.appendChild(commitEl);
                    });
                });
            } catch (error) {
                container.innerHTML = '<p>Erro ao carregar commits. Tente novamente mais tarde.</p>';
                console.error(error);
            }
        }

        fetchCommits();
    </script>
</body>
</html>
